name: ⚽ Football Daily Digest

on:
  schedule:
    #  Tourne chaque matin à 8h UTC
    #  → matchs du jour bien chargés, résultats d'hier disponibles
    - cron: '0 7 * * *'
  workflow_dispatch:   # Déclenchement manuel depuis GitHub UI

permissions:
  contents: read

jobs:
  daily_digest:
    runs-on: ubuntu-latest

    steps:
      # ── Setup ──────────────────────────────────────────────────────────────
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests

      # ── Extraction ─────────────────────────────────────────────────────────
      - name: ⚡ Fetch data — matchs du jour + résultats d'hier
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python ingestion/fetch_data.py

      # ── Email ──────────────────────────────────────────────────────────────
      - name: 📧 Generate & send daily digest email
        env:
          SMTP_HOST:  ${{ secrets.SMTP_HOST }}
          SMTP_PORT:  ${{ secrets.SMTP_PORT }}
          SMTP_USER:  ${{ secrets.SMTP_USER }}
          SMTP_PASS:  ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:   ${{ secrets.EMAIL_TO }}
        run: python report/send_email.py
